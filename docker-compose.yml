name: petals-for-her

x-build: &build
  build:
    context: .
    dockerfile: docker/Development.dockerfile
    args:
      UID: ${UID:-1000}
      GID: ${GID:-1000}

x-app: &app
  <<: *build
  stdin_open: true
  tty: true
  environment:
    RAILS_ENV: development
    DATABASE_ADAPTER: postgresql
    DATABASE_HOST: db
    DATABASE_PORT: 5432
    DATABASE_NAME: ${DATABASE_NAME:-petals_for_her_development}
    DATABASE_USERNAME: ${DATABASE_USERNAME:-petals_for_her}
    DATABASE_PASSWORD: ${DATABASE_PASSWORD:-petals_for_her_dev}
    # Set in .env for production; dev falls back to Rails secret_key_base if unset
    DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY:-}
    MAILPIT_SMTP_HOST: mailpit
    MAILPIT_SMTP_PORT: "1025"
  volumes:
    - .:/app:cached
    - bundle_cache:/usr/local/bundle
    - rails_cache:/app/tmp/cache

x-test: &test
  <<: *build
  stdin_open: true
  tty: true
  environment:
    RAILS_ENV: test
    DATABASE_ADAPTER: postgresql
    DATABASE_HOST: db
    DATABASE_PORT: 5432
    DATABASE_NAME: petals_for_her_test
    DATABASE_USERNAME: ${DATABASE_USERNAME:-petals_for_her}
    DATABASE_PASSWORD: ${DATABASE_PASSWORD:-petals_for_her_dev}
  volumes:
    - .:/app:cached
    - bundle_cache:/usr/local/bundle
  tmpfs:
    - /app/tmp:mode=1777

services:
  db:
    build:
      context: .
      dockerfile: docker/Postgres.dockerfile
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-petals_for_her}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-petals_for_her_dev}
      POSTGRES_DB: ${DATABASE_NAME:-petals_for_her_development}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-petals_for_her} -d ${DATABASE_NAME:-petals_for_her_development}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    <<: *app
    command: rails server -b 0.0.0.0 -p 3000 -P /tmp/server.pid
    ports:
      - "3000:3000"
    volumes:
      - .:/app:cached
      - bundle_cache:/usr/local/bundle
      - rails_cache:/app/tmp/cache
      - rails_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    environment:
      API_PROXY_TARGET: http://web:3000
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/app:cached
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - web

  test:
    <<: *test
    entrypoint: []
    command:
      - sh
      - -lc
      - |
        bundle check || bundle install --jobs 4
        bundle exec rails db:prepare
        echo "Test container ready. Run: docker compose exec test bash"
        tail -f /dev/null
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  bundle_cache:
  rails_cache:
  rails_storage:
  frontend_node_modules:
