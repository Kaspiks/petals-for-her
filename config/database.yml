# Database configuration for Petals for Her
# Supports both SQLite (local development) and PostgreSQL (Docker/production)

default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "petals_for_her") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "petals_for_her_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "petals_for_her_test") %>

production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME", "petals_for_her_production") %>
  cache:
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME", "petals_for_her_production") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME", "petals_for_her_production") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME", "petals_for_her_production") %>
    migrations_paths: db/cable_migrate
